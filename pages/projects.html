    <style>
      body {
        background-color: #0a0e17;
        color: #dfe2ef;
        overflow-x: hidden;
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 300,
          "GRAD" 0,
          "opsz" 24;
      }
      .glass-panel {
        background: rgba(49, 53, 63, 0.4);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      .nebula-glow {
        box-shadow:
          0 20px 40px rgba(0, 0, 0, 0.4),
          0 0 15px rgba(124, 58, 237, 0.05);
      }
      .card-hover:hover {
        background-color: #262a34;
        box-shadow: 0 0 20px rgba(124, 58, 237, 0.1);
        transform: translateY(-2px);
      }
      .focus-pulse {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: radial-gradient(circle, #cebdff 0%, transparent 70%);
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.5);
          opacity: 0.5;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      /* ===== Responsive helpers (tidak mengubah style/warna asli, hanya layout) ===== */

      /* Overlay saat sidebar mobile terbuka */
      #sidebarOverlay {
        display: none;
      }
      #sidebarOverlay.active {
        display: block;
      }

      /* Default: sidebar tersembunyi di mobile, tampil sebagai drawer */
      @media (max-width: 1023px) {
        #sideNav {
          transform: translateX(-100%);
          transition: transform 0.3s ease;
          width: 16rem; /* tetap w-64 */
        }
        #sideNav.open {
          transform: translateX(0);
        }

        /* Header & main menyesuaikan karena sidebar tidak lagi push content */
        #topAppBar {
          left: 0 !important;
          padding-left: 1rem;
          padding-right: 1rem;
        }
        #mainContent {
          margin-left: 0 !important;
          padding-left: 1rem;
          padding-right: 1rem;
        }

        #mobileMenuBtn {
          display: inline-flex;
        }
      }

      @media (min-width: 1024px) {
        #mobileMenuBtn {
          display: none;
        }
      }

      /* Sembunyikan search bar penuh di layar sangat kecil agar tidak menabrak ikon kanan */
      @media (max-width: 480px) {
        #headerSearchWrap {
          display: none;
        }
      }
    </style>

    <script>
      // Micro-interactions for the cards
      document.querySelectorAll(".card-hover").forEach((card) => {
        card.addEventListener("mouseenter", () => {
          const progress = card.querySelector(".bg-gradient-to-r");
          if (progress) {
            progress.style.filter = "brightness(1.2)";
          }
        });
        card.addEventListener("mouseleave", () => {
          const progress = card.querySelector(".bg-gradient-to-r");
          if (progress) {
            progress.style.filter = "none";
          }
        });
      });
